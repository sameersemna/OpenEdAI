name: Health Contract

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_strict_backends:
        description: "Run strict backend integration checks"
        required: false
        default: "false"

jobs:
  health-contract-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run fast CI health contract checks
        run: make test-ci-fast

  fast-contract-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Capture contract environment status JSON
        run: |
          mkdir -p artifacts/contracts
          make contract-env-status-json > artifacts/contracts/contract-env-status.json

      - name: Validate contract environment status JSON artifact
        run: make contract-env-validate-json CONTRACT_ENV_JSON=artifacts/contracts/contract-env-status.json

      - name: Validate contract environment JSON validator behavior
        run: make contract-env-validate-selftest

      - name: Validate contract environment checker behavior
        run: make contract-env-selftest

      - name: Run fast contract gate report
        run: make test-ci-fast-contracts-report

      - name: Resolve latest fast contract report path
        id: report
        run: |
          latest_report=$(ls -1t docs/reports/*-fast-contract-gate-report.md | head -1)
          echo "path=${latest_report}" >> "$GITHUB_OUTPUT"

      - name: Validate fast contract report markdown
        run: make fast-contract-report-validate-markdown FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}"

      - name: Validate fast contract report markdown validator behavior
        run: make fast-contract-report-validate-selftest

      - name: Generate fast contract status summary JSON
        run: |
          make fast-contract-status-summary \
            CONTRACT_ENV_JSON=artifacts/contracts/contract-env-status.json \
            FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}" \
            FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json

      - name: Validate fast contract status summary JSON
        run: make fast-contract-status-validate-json FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json

      - name: Validate fast contract status summary validator behavior
        run: make fast-contract-status-validate-selftest

      - name: Generate fast contract trend JSON
        run: make fast-contract-trend-json FAST_CONTRACT_TREND_LIMIT=10 FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json

      - name: Validate fast contract trend JSON
        run: make fast-contract-trend-validate-json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json

      - name: Assert fast contract trend thresholds
        run: make fast-contract-trend-assert FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_MAX_FAIL=0 FAST_CONTRACT_MAX_UNKNOWN=0 FAST_CONTRACT_MIN_PASS_RATE=100

      - name: Generate fast contract gate verdict JSON
        run: make fast-contract-gate-verdict FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json FAST_CONTRACT_MAX_FAIL=0 FAST_CONTRACT_MAX_UNKNOWN=0 FAST_CONTRACT_MIN_PASS_RATE=100

      - name: Validate fast contract gate verdict JSON
        run: make fast-contract-gate-verdict-validate-json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json

      - name: Validate fast contract trend validator behavior
        run: make fast-contract-trend-validate-selftest

      - name: Validate fast contract gate verdict JSON validator behavior
        run: make fast-contract-gate-verdict-validate-selftest

      - name: Validate fast contract gate verdict behavior
        run: make fast-contract-gate-verdict-selftest

      - name: Validate fast contract artifact verifier behavior
        run: make fast-contract-artifacts-verify-selftest

      - name: Validate fast contract cross-artifact consistency validator behavior
        run: make fast-contract-consistency-validate-selftest

      - name: Validate fast contract gate manifest assertion behavior
        run: make fast-contract-gate-manifest-assert-selftest

      - name: Assert fast contract gate manifest conformance
        run: make fast-contract-gate-manifest-assert

      - name: Validate fast contract cross-artifact consistency
        run: make fast-contract-consistency-validate FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}" FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json

      - name: Validate fast contract consistency status JSON
        run: make fast-contract-consistency-validate-json FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json

      - name: Validate fast contract consistency JSON validator behavior
        run: make fast-contract-consistency-json-validate-selftest

      - name: Validate fast contract consistency reason-code stability
        run: make fast-contract-consistency-reason-codes-selftest

      - name: Generate fast contract consistency KPI JSON
        run: make fast-contract-consistency-kpi-json FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json

      - name: Validate fast contract consistency KPI JSON
        run: make fast-contract-consistency-kpi-validate-json FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json

      - name: Validate fast contract consistency KPI JSON validator behavior
        run: make fast-contract-consistency-kpi-validate-selftest

      - name: Assert fast contract consistency KPI thresholds
        run: make fast-contract-consistency-kpi-assert FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json FAST_CONTRACT_EXPECTED_CONSISTENCY_PASS=1 FAST_CONTRACT_EXPECTED_GATE_PASS=1 FAST_CONTRACT_MAX_REASON_COUNT=0

      - name: Validate fast contract consistency KPI assertor behavior
        run: make fast-contract-consistency-kpi-assert-selftest

      - name: Generate fast contract artifact manifest JSON
        run: make fast-contract-artifact-manifest-generate FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}" CONTRACT_ENV_JSON=artifacts/contracts/contract-env-status.json FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Validate fast contract artifact manifest JSON
        run: make fast-contract-artifact-manifest-validate FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Validate fast contract artifact manifest validator behavior
        run: make fast-contract-artifact-manifest-validate-selftest

      - name: Validate fast contract artifact manifest path assertion behavior
        run: make fast-contract-artifact-manifest-assert-paths-selftest

      - name: Assert fast contract artifact manifest path integrity
        run: make fast-contract-artifact-manifest-assert-paths FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Generate fast contract artifact checksums
        run: make fast-contract-checksums-generate FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}" CONTRACT_ENV_JSON=artifacts/contracts/contract-env-status.json FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json FAST_CONTRACT_CHECKSUMS=artifacts/contracts/sha256sums.txt FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Verify fast contract artifact checksums
        run: make fast-contract-checksums-verify FAST_CONTRACT_CHECKSUMS=artifacts/contracts/sha256sums.txt FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Validate fast contract checksum verifier behavior
        run: make fast-contract-checksums-verify-selftest

      - name: Validate fast contract checksum tamper-detection behavior
        run: make fast-contract-checksums-tamper-selftest

      - name: Verify fast contract artifacts before upload
        run: |
          make fast-contract-artifacts-verify \
            FAST_CONTRACT_REPORT="${{ steps.report.outputs.path }}" \
            CONTRACT_ENV_JSON=artifacts/contracts/contract-env-status.json \
            FAST_CONTRACT_STATUS_SUMMARY=artifacts/contracts/fast-contract-status-summary.json \
            FAST_CONTRACT_TREND_JSON=artifacts/contracts/fast-contract-trend.json \
            FAST_CONTRACT_VERDICT_JSON=artifacts/contracts/fast-contract-gate-verdict.json \
            FAST_CONTRACT_CONSISTENCY_JSON=artifacts/contracts/fast-contract-consistency-status.json \
            FAST_CONTRACT_CONSISTENCY_KPI_JSON=artifacts/contracts/fast-contract-consistency-kpi.json \
            FAST_CONTRACT_CHECKSUMS=artifacts/contracts/sha256sums.txt \
            FAST_CONTRACT_ARTIFACT_MANIFEST=artifacts/contracts/fast-contract-artifact-manifest.json

      - name: Upload fast contract report artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast-contract-gate-report
          path: |
            ${{ steps.report.outputs.path }}
            artifacts/contracts/contract-env-status.json
            artifacts/contracts/fast-contract-status-summary.json
            artifacts/contracts/fast-contract-trend.json
            artifacts/contracts/fast-contract-gate-verdict.json
            artifacts/contracts/fast-contract-consistency-status.json
            artifacts/contracts/fast-contract-consistency-kpi.json
            artifacts/contracts/fast-contract-artifact-manifest.json
            artifacts/contracts/sha256sums.txt
          if-no-files-found: error
          retention-days: 14

      - name: Append fast contract summary
        run: |
          {
            echo "## Fast Contract Gate"
            echo "- Report: ${{ steps.report.outputs.path }}"
            echo "- Contract environment status JSON: artifacts/contracts/contract-env-status.json"
            echo "- Fast contract status summary JSON: artifacts/contracts/fast-contract-status-summary.json"
            echo "- Fast contract trend JSON: artifacts/contracts/fast-contract-trend.json"
            echo "- Fast contract gate verdict JSON: artifacts/contracts/fast-contract-gate-verdict.json"
            echo "- Fast contract consistency status JSON: artifacts/contracts/fast-contract-consistency-status.json"
            echo "- Fast contract consistency KPI JSON: artifacts/contracts/fast-contract-consistency-kpi.json"
            echo "- Fast contract artifact manifest JSON: artifacts/contracts/fast-contract-artifact-manifest.json"
            echo "- Fast contract artifact checksums: artifacts/contracts/sha256sums.txt"
            signed_artifact_count="$$(python3 -c "import json;print(json.load(open('artifacts/contracts/fast-contract-artifact-manifest.json', 'r', encoding='utf-8')).get('signed_artifact_count', 0))")"
            echo "- Checksum status: VERIFIED"
            echo "- Signed artifacts: $${signed_artifact_count}"
            verdict_overall="$$(python3 -c "import json;print(json.load(open('artifacts/contracts/fast-contract-gate-verdict.json', 'r', encoding='utf-8')).get('overall', 'UNKNOWN'))")"
            verdict_reasons="$$(python3 -c "import json;d=json.load(open('artifacts/contracts/fast-contract-gate-verdict.json', 'r', encoding='utf-8'));r=d.get('reason_codes', []);print(','.join(r) if r else 'none')")"
            echo "- Verdict: $${verdict_overall} ($${verdict_reasons})"
            echo
            echo "### Contract Environment Status"
            echo '```json'
            cat artifacts/contracts/contract-env-status.json
            echo '```'
            echo
            echo "### Fast Contract Status Summary"
            echo '```json'
            cat artifacts/contracts/fast-contract-status-summary.json
            echo '```'
            echo
            echo "### Fast Contract Trend"
            echo '```json'
            cat artifacts/contracts/fast-contract-trend.json
            echo '```'
            echo
            echo "### Fast Contract Verdict"
            echo '```json'
            cat artifacts/contracts/fast-contract-gate-verdict.json
            echo '```'
            echo
            echo "### Fast Contract Consistency Status"
            echo '```json'
            cat artifacts/contracts/fast-contract-consistency-status.json
            echo '```'
            echo
            echo "### Fast Contract Consistency KPI"
            echo '```json'
            cat artifacts/contracts/fast-contract-consistency-kpi.json
            echo '```'
            echo
            echo "### Fast Contract Artifact Manifest"
            echo '```json'
            cat artifacts/contracts/fast-contract-artifact-manifest.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  health-contract-strict:
    if: ${{ vars.RUN_STRICT_BACKEND_TESTS == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_strict_backends == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run strict integration checks
        run: make test-ci-strict
