name: Script Lint

on:
  pull_request:
    paths:
      - scripts/**
      - .github/workflows/**
      - Makefile
  push:
    branches: [ main ]
    paths:
      - scripts/**
      - .github/workflows/**
      - Makefile
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: make shellcheck-scripts
