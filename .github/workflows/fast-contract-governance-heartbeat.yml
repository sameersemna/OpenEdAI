name: Fast Contract Governance Heartbeat

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      run_strict_local_checks:
        description: "Run strict-local contract checks (requires reachable backends)"
        required: false
        default: "false"

jobs:
  fast-contract-governance-heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify workflow conventions
        run: make verify-workflow-conventions

      - name: Validate workflow conventions expected-count behavior
        run: make verify-workflow-conventions-fast-contract-expected-count-selftest

      - name: Validate workflow conventions policy-fingerprint-summary behavior
        run: make verify-workflow-conventions-fast-contract-policy-fingerprint-summary-selftest

      - name: Validate workflow conventions policy-fingerprint-summary-order behavior
        run: make verify-workflow-conventions-fast-contract-policy-fingerprint-summary-order-selftest

      - name: Validate workflow conventions heartbeat canonical behavior
        run: make verify-workflow-conventions-fast-contract-heartbeat-canonical-selftest

      - name: Validate workflow conventions heartbeat unexpected-vs-run-order priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-unexpected-vs-run-order-priority-selftest

      - name: Validate workflow conventions summary error-message stability
        run: make verify-workflow-conventions-fast-contract-summary-error-messages-selftest

      - name: Validate workflow conventions summary single-fault determinism
        run: make verify-workflow-conventions-fast-contract-summary-single-fault-selftest

      - name: Validate workflow conventions heartbeat duplicate required-command behavior
        run: make verify-workflow-conventions-fast-contract-heartbeat-duplicate-required-command-selftest

      - name: Validate workflow conventions heartbeat required-command priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-required-command-priority-selftest

      - name: Validate workflow conventions heartbeat required-command order
        run: make verify-workflow-conventions-fast-contract-heartbeat-required-command-order-selftest

      - name: Validate workflow conventions heartbeat mixed-fault priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-mixed-fault-priority-selftest

      - name: Validate workflow conventions heartbeat unexpected-command allowlist
        run: make verify-workflow-conventions-fast-contract-heartbeat-unexpected-command-selftest

      - name: Validate workflow conventions heartbeat unexpected-over-missing priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-unexpected-over-missing-priority-selftest

      - name: Validate workflow conventions heartbeat step-name lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-step-name-lock-selftest

      - name: Validate workflow conventions heartbeat step-name duplicate
        run: make verify-workflow-conventions-fast-contract-heartbeat-step-name-duplicate-selftest

      - name: Validate workflow conventions heartbeat required-step-name order
        run: make verify-workflow-conventions-fast-contract-heartbeat-required-step-name-order-selftest

      - name: Validate workflow conventions heartbeat step-name-order-vs-run-order priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-step-name-order-vs-run-order-priority-selftest

      - name: Validate workflow conventions heartbeat step-name-vs-command priority
        run: make verify-workflow-conventions-fast-contract-heartbeat-step-name-vs-command-priority-selftest

      - name: Validate workflow conventions heartbeat manifest schema
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-selftest

      - name: Validate workflow conventions heartbeat manifest schema-version lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-version-selftest

      - name: Validate workflow conventions heartbeat manifest top-level keys lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-keys-selftest

      - name: Validate workflow conventions heartbeat manifest keys-vs-step-name-order priority lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-keys-vs-step-name-order-priority-selftest

      - name: Validate workflow conventions heartbeat manifest keys-vs-command-class-order priority lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-keys-vs-command-class-order-priority-selftest

      - name: Validate workflow conventions heartbeat manifest run-command order lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-run-order-selftest

      - name: Validate workflow conventions heartbeat manifest command-class order lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-command-class-order-selftest

      - name: Validate workflow conventions heartbeat manifest command-class priority lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-command-class-priority-selftest

      - name: Validate workflow conventions heartbeat manifest step-name order lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-manifest-step-name-order-selftest

      - name: Validate workflow conventions heartbeat step-count lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-step-count-selftest

      - name: Validate workflow conventions heartbeat make-step-name lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-make-step-name-selftest

      - name: Validate workflow conventions heartbeat verify-block contiguous lock
        run: make verify-workflow-conventions-fast-contract-heartbeat-verify-block-contiguous-selftest

      - name: Validate fast contract report markdown validator behavior
        run: make fast-contract-report-validate-selftest

      - name: Validate fast contract status summary validator behavior
        run: make fast-contract-status-validate-selftest

      - name: Validate fast contract trend validator behavior
        run: make fast-contract-trend-validate-selftest

      - name: Validate fast contract gate verdict JSON validator behavior
        run: make fast-contract-gate-verdict-validate-selftest

      - name: Validate fast contract artifact verifier behavior
        run: make fast-contract-artifacts-verify-selftest

      - name: Validate fast contract cross-artifact consistency validator behavior
        run: make fast-contract-consistency-validate-selftest

      - name: Validate fast contract consistency JSON validator behavior
        run: make fast-contract-consistency-json-validate-selftest

      - name: Validate fast contract consistency reason-code stability
        run: make fast-contract-consistency-reason-codes-selftest

      - name: Validate fast contract consistency KPI JSON validator behavior
        run: make fast-contract-consistency-kpi-validate-selftest

      - name: Validate fast contract consistency KPI assertor behavior
        run: make fast-contract-consistency-kpi-assert-selftest

      - name: Validate fast contract artifact manifest validator behavior
        run: make fast-contract-artifact-manifest-validate-selftest

      - name: Validate fast contract artifact manifest path assertion behavior
        run: make fast-contract-artifact-manifest-assert-paths-selftest

      - name: Validate fast contract artifact manifest version-lock behavior
        run: make fast-contract-artifact-manifest-version-lock-selftest

      - name: Validate fast contract signed-count version-map parser behavior
        run: make fast-contract-signed-count-version-map-parser-selftest

      - name: Validate fast contract signed-count lock matrix behavior
        run: make fast-contract-signed-count-lock-matrix-selftest

      - name: Validate fast contract signed-count lock error-message behavior
        run: make fast-contract-signed-count-lock-error-messages-selftest

      - name: Validate fast contract gate verdict reason-code behavior
        run: make fast-contract-gate-verdict-reason-codes-selftest

      - name: Validate fast contract policy fingerprint JSON validator behavior
        run: make fast-contract-policy-fingerprint-validate-selftest

      - name: Validate fast contract policy fingerprint canonical serialization behavior
        run: make fast-contract-policy-fingerprint-canonical-selftest

      - name: Validate fast contract policy fingerprint drift behavior
        run: make fast-contract-policy-fingerprint-drift-selftest

      - name: Validate fast contract checksum verifier behavior
        run: make fast-contract-checksums-verify-selftest

      - name: Validate fast contract checksum tamper-detection behavior
        run: make fast-contract-checksums-tamper-selftest

      - name: Validate fast contract gate manifest assertion behavior
        run: make fast-contract-gate-manifest-assert-selftest

      - name: Assert fast contract gate manifest conformance
        run: make fast-contract-gate-manifest-assert

      - name: Run strict-local checks (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_strict_local_checks == 'true' }}
        run: make test-ci-fast-contracts-strict-local
